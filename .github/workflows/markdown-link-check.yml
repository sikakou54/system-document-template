name: Markdown Link Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/workflows/mlc_config.json'
          folder-path: '社員名簿管理システム'
          file-path: './社員名簿管理システム_統合設計書.md'
          file-extension: '.md'
      - name: Check template Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/workflows/mlc_config.json'
          folder-path: 'テンプレート'
          file-path: './テンプレート_統合設計書.md'
          file-extension: '.md'
      - name: Check root README and CLAUDE.md links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          config-file: '.github/workflows/mlc_config.json'
          file-path: './README.md, ./CLAUDE.md'
          file-extension: '.md'
