<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1024px; height: 620px; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #eef1f5; color: #1f2733; -webkit-font-smoothing: antialiased;
  }
  .browser { width: 1024px; height: 620px; background: #fff; display: flex; flex-direction: column; }
  .chrome { height: 40px; background: #dfe3e9; display: flex; align-items: center; gap: 8px; padding: 0 14px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .url { flex: 1; margin-left: 10px; height: 24px; background: #fff; border-radius: 12px;
    display: flex; align-items: center; padding: 0 14px; color: #6b7280; font-size: 12px; }
  .appbar { height: 56px; background: #2563eb; color: #fff; display: flex; align-items: center;
    padding: 0 24px; gap: 16px; }
  .brand { font-weight: 700; font-size: 17px; letter-spacing: .3px; }
  .appbar .title { font-size: 14px; opacity: .9; border-left: 1px solid rgba(255,255,255,.4); padding-left: 16px; }
  .avatar { margin-left: auto; width: 30px; height: 30px; border-radius: 50%; background: #93c5fd;
    display: flex; align-items: center; justify-content: center; font-size: 12px; color: #1e3a8a; font-weight: 700; }
  .content { padding: 24px; }
  .head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  .head h2 { font-size: 15px; font-weight: 700; }
  .head .count { font-size: 12px; color: #6b7280; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e6ec;
    border-radius: 10px; overflow: hidden; font-size: 13px; }
  th { text-align: left; background: #f7f9fc; color: #6b7280; font-weight: 600; font-size: 11px;
    padding: 11px 16px; border-bottom: 1px solid #e2e6ec; }
  td { padding: 13px 16px; border-bottom: 1px solid #eef1f5; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  td.name { font-weight: 600; }
  .status { display: inline-block; border-radius: 5px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
  .status.ok { background: #e0f2fe; color: #0369a1; }
  .status.cancel { background: #f1f5f9; color: #94a3b8; }
  .status.done { background: #ecfdf5; color: #059669; }
  td.act { text-align: right; white-space: nowrap; }
  .btn { height: 30px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-flex;
    align-items: center; justify-content: center; padding: 0 14px; border: 1px solid transparent; margin-left: 6px; }
  .btn.edit { background: #fff; color: #2563eb; border-color: #93c5fd; }
  .btn.cancel { background: #fff; color: #dc2626; border-color: #fca5a5; }
  .btn.disabled { background: #f8fafc; color: #cbd2dc; border-color: #e2e6ec; }
</style>
</head>
<body>
  <div class="browser">
    <div class="chrome">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="url">https://meetroom.example/reservations</span>
    </div>
    <div class="appbar">
      <span class="brand">MeetRoom</span>
      <span class="title">予約一覧</span>
      <span class="avatar">山</span>
    </div>
    <div class="content">
      <div class="head"><h2>マイ予約</h2><span class="count">3 件</span></div>
      <table>
        <thead>
          <tr>
            <th style="width:20%">会議室</th><th style="width:28%">日時</th>
            <th>タイトル</th><th style="width:12%">状態</th><th style="width:22%"></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="name">会議室A</td><td>2026-07-10 10:00〜11:00</td>
            <td>定例ミーティング</td><td><span class="status ok">予約済</span></td>
            <td class="act"><span class="btn edit">変更</span><span class="btn cancel">キャンセル</span></td>
          </tr>
          <tr>
            <td class="name">大会議室</td><td>2026-07-12 14:00〜16:00</td>
            <td>四半期レビュー</td><td><span class="status ok">予約済</span></td>
            <td class="act"><span class="btn edit">変更</span><span class="btn cancel">キャンセル</span></td>
          </tr>
          <tr>
            <td class="name">会議室B</td><td>2026-07-01 09:00〜10:00</td>
            <td>採用面談</td><td><span class="status done">完了</span></td>
            <td class="act"><span class="btn disabled">変更</span><span class="btn disabled">キャンセル</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
