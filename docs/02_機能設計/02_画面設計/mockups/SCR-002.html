<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1024px; height: 560px; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #eef1f5; color: #1f2733; -webkit-font-smoothing: antialiased;
  }
  .browser { width: 1024px; height: 560px; background: #fff; display: flex; flex-direction: column; }
  .chrome { height: 40px; background: #dfe3e9; display: flex; align-items: center; gap: 8px; padding: 0 14px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .url { flex: 1; margin-left: 10px; height: 24px; background: #fff; border-radius: 12px;
    display: flex; align-items: center; padding: 0 14px; color: #6b7280; font-size: 12px; }
  .appbar { height: 56px; background: #2563eb; color: #fff; display: flex; align-items: center;
    padding: 0 24px; gap: 16px; }
  .brand { font-weight: 700; font-size: 17px; letter-spacing: .3px; }
  .appbar .title { font-size: 14px; opacity: .9; border-left: 1px solid rgba(255,255,255,.4); padding-left: 16px; }
  .avatar { margin-left: auto; width: 30px; height: 30px; border-radius: 50%; background: #93c5fd;
    display: flex; align-items: center; justify-content: center; font-size: 12px; color: #1e3a8a; font-weight: 700; }
  .content { padding: 22px 24px; overflow: hidden; }
  .card { background: #fff; border: 1px solid #e2e6ec; border-radius: 10px; padding: 18px 20px;
    box-shadow: 0 1px 2px rgba(16,24,40,.04); }
  .card h2 { font-size: 13px; color: #374151; margin-bottom: 14px; font-weight: 700; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; align-items: end; }
  .field label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 5px; }
  .req { color: #dc2626; margin-left: 3px; }
  .field .inp { height: 36px; border: 1px solid #cbd2dc; border-radius: 7px; background: #fff;
    display: flex; align-items: center; padding: 0 10px; font-size: 13px; color: #1f2733; }
  .field .inp.ph { color: #9aa3af; }
  .field .inp.sel::after { content: "▾"; margin-left: auto; color: #9aa3af; font-size: 11px; }
  .btn { height: 36px; border-radius: 7px; font-size: 13px; font-weight: 600; display: inline-flex;
    align-items: center; justify-content: center; padding: 0 18px; border: 1px solid transparent; }
  .btn.primary { background: #2563eb; color: #fff; }
  .btn.small { height: 30px; padding: 0 14px; font-size: 12px; }
  .btn.ghost { background: #fff; color: #2563eb; border-color: #93c5fd; }
  .results { margin-top: 20px; }
  .results .head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .results .head h2 { font-size: 14px; font-weight: 700; }
  .results .head .count { font-size: 12px; color: #6b7280; }
  table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e2e6ec;
    border-radius: 10px; overflow: hidden; font-size: 13px; }
  th { text-align: left; background: #f7f9fc; color: #6b7280; font-weight: 600; font-size: 11px;
    padding: 10px 16px; border-bottom: 1px solid #e2e6ec; }
  td { padding: 12px 16px; border-bottom: 1px solid #eef1f5; }
  tr:last-child td { border-bottom: none; }
  td.name { font-weight: 600; }
  .tag { display: inline-block; background: #eef2ff; color: #4338ca; border-radius: 5px;
    padding: 2px 8px; font-size: 11px; margin-right: 4px; }
  td.act { text-align: right; }
</style>
</head>
<body>
  <div class="browser">
    <div class="chrome">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="url">https://meetroom.example/rooms</span>
    </div>
    <div class="appbar">
      <span class="brand">MeetRoom</span>
      <span class="title">会議室検索</span>
      <span class="avatar">山</span>
    </div>
    <div class="content">
      <div class="card">
        <h2>検索条件</h2>
        <div class="grid">
          <div class="field"><label>利用日<span class="req">*</span></label><div class="inp">2026-07-10</div></div>
          <div class="field"><label>開始時刻</label><div class="inp sel ph">--:--</div></div>
          <div class="field"><label>終了時刻</label><div class="inp sel ph">--:--</div></div>
          <div class="field"><label>人数</label><div class="inp ph">指定なし</div></div>
          <div class="field"><label>設備</label><div class="inp sel ph">指定なし</div></div>
        </div>
        <div style="margin-top:16px; text-align:right;">
          <span class="btn primary">検索</span>
        </div>
      </div>

      <div class="results">
        <div class="head"><h2>検索結果</h2><span class="count">3 件</span></div>
        <table>
          <thead>
            <tr><th style="width:34%">会議室</th><th style="width:12%">定員</th><th>設備</th><th style="width:14%"></th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="name">会議室A</td><td>8 名</td>
              <td><span class="tag">プロジェクタ</span><span class="tag">ホワイトボード</span></td>
              <td class="act"><span class="btn primary small">予約する</span></td>
            </tr>
            <tr>
              <td class="name">会議室B</td><td>4 名</td>
              <td><span class="tag">モニタ</span></td>
              <td class="act"><span class="btn primary small">予約する</span></td>
            </tr>
            <tr>
              <td class="name">大会議室</td><td>20 名</td>
              <td><span class="tag">プロジェクタ</span><span class="tag">マイク</span><span class="tag">TV会議</span></td>
              <td class="act"><span class="btn primary small">予約する</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
