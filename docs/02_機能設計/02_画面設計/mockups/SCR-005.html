<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1024px; height: 660px; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #eef1f5; color: #1f2733; -webkit-font-smoothing: antialiased;
  }
  .browser { width: 1024px; height: 660px; background: #fff; display: flex; flex-direction: column; }
  .chrome { height: 40px; background: #dfe3e9; display: flex; align-items: center; gap: 8px; padding: 0 14px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .url { flex: 1; margin-left: 10px; height: 24px; background: #fff; border-radius: 12px;
    display: flex; align-items: center; padding: 0 14px; color: #6b7280; font-size: 12px; }
  .appbar { height: 56px; background: #1e293b; color: #fff; display: flex; align-items: center;
    padding: 0 24px; gap: 16px; }
  .brand { font-weight: 700; font-size: 17px; letter-spacing: .3px; }
  .appbar .title { font-size: 14px; opacity: .9; border-left: 1px solid rgba(255,255,255,.4); padding-left: 16px; }
  .admin { margin-left: 14px; font-size: 11px; background: #334155; padding: 3px 10px; border-radius: 5px; }
  .avatar { margin-left: auto; width: 30px; height: 30px; border-radius: 50%; background: #64748b;
    display: flex; align-items: center; justify-content: center; font-size: 12px; color: #f1f5f9; font-weight: 700; }
  .content { padding: 24px; display: flex; justify-content: center; }
  .card { width: 620px; background: #fff; border: 1px solid #e2e6ec; border-radius: 10px; padding: 10px 24px;
    box-shadow: 0 1px 2px rgba(16,24,40,.04); }
  .card h2 { font-size: 14px; color: #374151; font-weight: 700; padding: 16px 0 6px; }
  .row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #eef1f5; }
  .row .lbl { width: 130px; font-size: 12px; color: #6b7280; }
  .req { color: #dc2626; margin-left: 3px; }
  .ctrl { flex: 1; }
  .inp { height: 38px; border: 1px solid #cbd2dc; border-radius: 7px; background: #fff;
    display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: #1f2733; }
  .inp.sel::after { content: "▾"; margin-left: auto; color: #9aa3af; font-size: 11px; }
  .inp.short { width: 160px; }
  .yen { display: flex; align-items: center; gap: 8px; }
  .yen .u { font-size: 12px; color: #6b7280; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { font-size: 12px; border: 1px solid #cbd2dc; border-radius: 6px; padding: 6px 12px; color: #475569; }
  .chip.on { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; font-weight: 600; }
  .chip .box { display: inline-block; margin-right: 6px; }
  .actions { display: flex; justify-content: flex-end; margin: 20px 0 8px; }
  .btn { height: 40px; border-radius: 7px; font-size: 14px; font-weight: 700; background: #2563eb; color: #fff;
    border: none; display: inline-flex; align-items: center; justify-content: center; padding: 0 30px; }
</style>
</head>
<body>
  <div class="browser">
    <div class="chrome">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="url">https://meetroom.example/admin/rooms</span>
    </div>
    <div class="appbar">
      <span class="brand">MeetRoom</span>
      <span class="title">会議室・設備管理</span>
      <span class="admin">管理者</span>
      <span class="avatar">総</span>
    </div>
    <div class="content">
      <div class="card">
        <h2>会議室情報</h2>
        <div class="row"><span class="lbl">会議室名<span class="req">*</span></span>
          <div class="ctrl"><div class="inp">会議室A</div></div></div>
        <div class="row"><span class="lbl">収容人数<span class="req">*</span></span>
          <div class="ctrl"><div class="inp short">8</div></div></div>
        <div class="row"><span class="lbl">設置場所</span>
          <div class="ctrl"><div class="inp">本社 5F</div></div></div>
        <div class="row"><span class="lbl">利用単価<span class="req">*</span></span>
          <div class="ctrl yen"><div class="inp short">500</div><span class="u">円 / 時（0=無料）</span></div></div>
        <div class="row"><span class="lbl">ステータス<span class="req">*</span></span>
          <div class="ctrl"><div class="inp sel short">利用可</div></div></div>
        <div class="row"><span class="lbl">設備</span>
          <div class="ctrl chips">
            <span class="chip on"><span class="box">☑</span>プロジェクタ</span>
            <span class="chip on"><span class="box">☑</span>ホワイトボード</span>
            <span class="chip"><span class="box">☐</span>モニタ</span>
            <span class="chip"><span class="box">☐</span>TV会議</span>
            <span class="chip"><span class="box">☐</span>マイク</span>
          </div></div>
        <div class="row" style="border-bottom:none;"><span class="lbl">備考</span>
          <div class="ctrl"><div class="inp" style="height:52px; align-items:flex-start; padding-top:9px; color:#9aa3af;">窓側・電源多め</div></div></div>
        <div class="actions"><span class="btn">保存</span></div>
      </div>
    </div>
  </div>
</body>
</html>
