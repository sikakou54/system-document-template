<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1024px; height: 600px; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background: #eef1f5; color: #1f2733; -webkit-font-smoothing: antialiased;
  }
  .browser { width: 1024px; height: 600px; background: #fff; display: flex; flex-direction: column; }
  .chrome { height: 40px; background: #dfe3e9; display: flex; align-items: center; gap: 8px; padding: 0 14px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .url { flex: 1; margin-left: 10px; height: 24px; background: #fff; border-radius: 12px;
    display: flex; align-items: center; padding: 0 14px; color: #6b7280; font-size: 12px; }
  .stage { flex: 1; background: #eef1f5; display: flex; align-items: center; justify-content: center; }
  .login { width: 380px; background: #fff; border: 1px solid #e2e6ec; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(16,24,40,.08); padding: 36px 34px; }
  .brand { font-weight: 700; font-size: 24px; letter-spacing: .3px; color: #2563eb; text-align: center; }
  .sub { text-align: center; font-size: 12px; color: #9aa3af; margin: 6px 0 26px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .req { color: #dc2626; margin-left: 3px; }
  .inp { height: 40px; border: 1px solid #cbd2dc; border-radius: 7px; background: #fff;
    display: flex; align-items: center; padding: 0 12px; font-size: 13px; color: #1f2733; }
  .inp.ph { color: #9aa3af; }
  .btn { width: 100%; height: 42px; border-radius: 7px; font-size: 14px; font-weight: 700;
    background: #2563eb; color: #fff; border: none; display: flex; align-items: center;
    justify-content: center; margin-top: 8px; }
</style>
</head>
<body>
  <div class="browser">
    <div class="chrome">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="url">https://meetroom.example/login</span>
    </div>
    <div class="stage">
      <div class="login">
        <div class="brand">MeetRoom</div>
        <div class="sub">社内会議室予約システム</div>
        <div class="field">
          <label>メールアドレス<span class="req">*</span></label>
          <div class="inp ph">you@example.com</div>
        </div>
        <div class="field">
          <label>パスワード<span class="req">*</span></label>
          <div class="inp">••••••••</div>
        </div>
        <div class="btn">ログイン</div>
      </div>
    </div>
  </div>
</body>
</html>
